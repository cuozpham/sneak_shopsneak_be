[build]
buildCommand = "./mvnw clean package -DskipTests"

[deploy]
startCommand = "sh -c 'exec java -XX:InitialRAMPercentage=20 -XX:MaxRAMPercentage=65 -XX:+ExitOnOutOfMemoryError -jar target/sneak_shop-0.0.1-SNAPSHOT.jar --server.address=0.0.0.0'"
healthcheckPath = "/actuator/health/readiness"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
