[build]
buildCommand = "./mvnw clean package -DskipTests"

[deploy]
startCommand = "sh -c 'exec java -XX:MaxRAMPercentage=65 -XX:+ExitOnOutOfMemoryError -jar target/sneak_shop-0.0.1-SNAPSHOT.jar --spring.profiles.active=prod --server.address=0.0.0.0'"
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
