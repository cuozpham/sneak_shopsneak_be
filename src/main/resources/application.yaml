---
spring:
  config:
    activate:
      on-profile: test
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false

logging:
  level:
    org.hibernate.tool.schema: ERROR

---
spring:
  config:
    activate:
      on-profile: prod
  flyway:
    enabled: true
    baseline-on-migrate: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
    baseline-version: ${SPRING_FLYWAY_BASELINE_VERSION:20}
    locations: classpath:db
    repair-on-migrate: true
  datasource:
    url: ${DB_URL}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      initialization-fail-timeout: -1
      connection-timeout: 10000
      validation-timeout: 5000
      maximum-pool-size: 5
      minimum-idle: 0
      idle-timeout: 300000
      max-lifetime: 900000
      keepalive-time: 120000
  threads:
    virtual:
      enabled: true
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        boot:
          allow_jdbc_metadata_access: false
        temp:
          use_jdbc_metadata_defaults: false

server:
  tomcat:
    threads:
      max: 24
      min-spare: 2
